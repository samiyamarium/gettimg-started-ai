<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agent Factory – Getting Started (Review Enabled)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#ffe4f1,#f7f7f7);
}

/* HEADER */
header{
    background:linear-gradient(135deg,#ffb6d5,#c0c0c0);
    padding:30px;
    text-align:center;
}

/* LAYOUT */
.container{
    width:92%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* QUESTION */
.question{
    background:white;
    padding:15px;
    margin:10px 0;
    border-left:5px solid #ff69b4;
    border-radius:10px;
}

/* BUTTON */
button{
    background:#ff69b4;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
}

/* RESULT */
.result{
    margin-top:20px;
    padding:15px;
    background:#fff0f6;
    border:1px solid #ffb6d5;
    border-radius:10px;
}

/* REVIEW BOX */
.review{
    margin-top:20px;
    padding:15px;
    background:white;
    border-radius:10px;
    border:1px solid #ddd;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>Agent Factory – Getting Started</h1>
<p>MCQ Exam with Instant Review + Correct Answer Fixing</p>
</header>

<div class="container">

<h2>📝 30 MCQ Exam</h2>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit Exam</button>

<div id="result"></div>
<div id="review"></div>

</div>

<script>

/* 30 MCQs */
const questions = [
["What is Agent Factory?","Traditional software","AI workforce system","Database","UI framework","B"],
["Digital FTE means?","Human worker","AI worker","Server","API","B"],
["AI Native means?","AI optional","AI core","No AI","Manual system","B"],
["Spec-driven uses?","Random code","Structured specs","Guessing","UI only","B"],
["Execution loop is?","Random","Define→Execute→Verify→Improve","Stop system","Skip verify","B"],
["Memory enables?","Loss","Continuity","Noise","Delay","B"],
["Context engineering manages?","GPU","Information flow","Hardware","UI","B"],
["Monetization includes?","Free only","Subscriptions","No value","Manual","B"],
["AI spectrum starts with?","AI Native","AI Assisted","AI OS","AI Cloud","B"],
["Agents are?","Static apps","Dynamic systems","Files","Images","B"],
["FTE works?","8 hours","24/7","Offline","Manual","B"],
["Spec replaces?","Structure","Guessing","Randomness","UI","B"],
["Evaluation improves?","Failure","Quality","Noise","Delay","B"],
["Factory output is?","Chat","Systems","Images","Logs","B"],
["Stable system is?","Random","Predictable","Broken","Slow","B"],
["Not part of system?","Memory","Context","Guessing","Evaluation","C"],
["Reusable asset means?","Waste","Growth","Error","Delay","B"],
["Execution layer is?","Runtime","UI","Memory","Storage","A"],
["AI Native org uses?","Manual","AI core","Paper","Excel","B"],
["Best outcome?","System","Random","Noise","Failure","A"],

["Agent learns via?","Feedback","Noise","Random","Error","A"],
["Context improves?","Accuracy","Confusion","Delay","Loss","A"],
["Memory type is?","Structured","Random","Deleted","Hidden","A"],
["Monetization type?","Subscription","Free","Loss","Spam","A"],
["Execution cycle?","Loop","Break","Stop","Reset","A"],
["Agent goal?","Automation","Manual work","Chat only","UI","A"],
["Spec benefit?","Clarity","Chaos","Noise","Delay","A"],
["AI replaces?","Workflows","Nothing","UI","CSS","A"],
["Factory mindset?","Reuse","Waste","Random","Chaos","A"],
["Learning system?","Iterative","Static","Broken","Manual","A"]
];

let quiz=document.getElementById("quiz");

questions.forEach((q,i)=>{
quiz.innerHTML+=`
<div class="question">
<b>${i+1}. ${q[0]}</b><br><br>
<label><input type="radio" name="q${i}" value="A"> ${q[1]}</label><br>
<label><input type="radio" name="q${i}" value="B"> ${q[2]}</label><br>
<label><input type="radio" name="q${i}" value="C"> ${q[3]}</label><br>
<label><input type="radio" name="q${i}" value="D"> ${q[4]}</label>
</div>
`;
});

/* SUBMIT + REVIEW ENGINE */
function submitQuiz(){
let score=0;
let reviewHTML="";

questions.forEach((q,i)=>{

let selected=document.querySelector(`input[name=q${i}]:checked`);
let userAns = selected ? selected.value : "Not Answered";
let correct = q[5];

if(userAns === correct){
score++;
} else {

reviewHTML += `
<div class="review">
<b>Q${i+1}: ${q[0]}</b><br>
❌ Your Answer: <span class="wrong">${userAns}</span><br>
✔ Correct Answer: <span class="correct">${correct}</span>
</div>
`;
}

});

document.getElementById("result").innerHTML=
`<div class="result">
Score: ${score}/30<br>
${score>=21?"🎉 PASS":"❌ FAIL"}
</div>`;

document.getElementById("review").innerHTML=reviewHTML;
}

</script>

</body>
</html>
